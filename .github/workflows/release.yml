name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.1.0). Leave empty for snapshot build."
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.inputs.tag_name }}") {
            "${{ github.event.inputs.tag_name }}"
          } else {
            "${{ github.ref_name }}"
          }
          $ver = $tag -replace '^v', ''
          if ($ver -match '^\d+\.\d+') {
            (Get-Content pyproject.toml) -replace 'version = ".*?"', "version = `"$ver`"" |
              Set-Content pyproject.toml
            (Get-Content src/__init__.py) -replace '__version__ = ".*?"', "__version__ = `"$ver`"" |
              Set-Content src/__init__.py
            Write-Host "Stamped version: $ver"
          }

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[input,gui,ai]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean SkyMusicAutomation.spec

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path dist/SkyMusicAutomation/* -DestinationPath SkyMusicAutomation-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMusicAutomation-windows
          path: SkyMusicAutomation-windows.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: artifacts/*
